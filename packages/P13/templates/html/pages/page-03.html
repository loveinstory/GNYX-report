<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第03页 - 检测结果概览</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-03" aria-label="第03页 检测结果概览">
              <header class="report-header">
                <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
                <p class="editable page-label" contenteditable="true" spellcheck="false">年轻力精准评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>03</strong>/10</p>
              </header>
              <section class="section-title">
                <h1 class="editable" contenteditable="true" spellcheck="false">二、检测结果概览</h1>
                <span class="title-accent" aria-hidden="true"></span>
              </section>
              <section class="result-cards">
                <article class="result-card soft-card">
                  <span class="icon-orb">⌁</span>
                  <h2 class="editable result-title" contenteditable="true" spellcheck="false">端粒相对长度</h2>
                  <strong class="editable result-value" contenteditable="true" spellcheck="false" data-field="p13.telomere.relative_length">0.95</strong>
                </article>
                <article class="result-card soft-card green">
                  <span class="icon-orb green">群</span>
                  <h2 class="editable result-title" contenteditable="true" spellcheck="false">人群百分位</h2>
                  <p class="editable result-value inline" contenteditable="true" spellcheck="false" data-field="p13.percentile.display">超过 <strong>19%</strong> 同龄人</p>
                </article>
              </section>
              <section class="basic-table" aria-label="检测指标表">
                <div class="row">
                  <div class="cell head editable" contenteditable="true" spellcheck="false">检测指标</div>
                  <div class="cell head editable" contenteditable="true" spellcheck="false">检测结果</div>
                </div>
                <div class="row">
                  <div class="cell editable" contenteditable="true" spellcheck="false">端粒Ct值</div>
                  <div class="cell editable" contenteditable="true" spellcheck="false" data-field="p13.telomere.ct_value">24.95</div>
                </div>
                <div class="row">
                  <div class="cell editable" contenteditable="true" spellcheck="false">内参Ct值</div>
                  <div class="cell editable" contenteditable="true" spellcheck="false" data-field="p13.reference.ct_value">19.54</div>
                </div>
              </section>
            </section>
    </main>
  </body>
</html>
