<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第03页 - 检测结果概览（1/2）</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-03" aria-label="第03页 检测结果概览">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">安康御癌专项评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>03</strong>/11</p>
        </header>
        <section class="section-heading">
          <h1 class="editable" contenteditable="true" spellcheck="false">二、检测结果概览（1/2）</h1>
        </section>
        <section class="metric-title">
          <span class="icon-orb">盾</span>
          <h2 class="editable" contenteditable="true" spellcheck="false">肿瘤风险评估指标概览</h2>
        </section>
        <section class="metric-list">
          <article class="metric-card panel">
            <span class="metric-icon icon-orb">↗</span>
            <div class="metric-value">
              <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.cda.name">CDA</h3>
              <strong class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.cda.result_display">45.80 U/mL</strong>
              <span class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.cda.unit">U/mL</span>
            </div>
            <div class="range-box">
              <p class="editable" contenteditable="true" spellcheck="false">参考范围</p>
              <b class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.cda.reference_range">0 - 50.00 U/mL</b>
              <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p14.results.cda.status">在参考范围内</span>
            </div>
          </article>
          <article class="metric-card panel">
            <span class="metric-icon icon-orb">＋</span>
            <div class="metric-value">
              <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ptf.name">PTF</h3>
              <strong class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ptf.result_display">25.78 pg/mL</strong>
              <span class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ptf.unit">pg/mL</span>
            </div>
            <div class="range-box">
              <p class="editable" contenteditable="true" spellcheck="false">参考范围</p>
              <b class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ptf.reference_range">0 - 30.00 pg/mL</b>
              <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p14.results.ptf.status">在参考范围内</span>
            </div>
          </article>
          <article class="metric-card panel">
            <span class="metric-icon icon-orb">◎</span>
            <div class="metric-value">
              <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ctf.name">CTF</h3>
              <strong class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ctf.result_display">105.89 ng/mL</strong>
              <span class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ctf.unit">ng/mL</span>
            </div>
            <div class="range-box">
              <p class="editable" contenteditable="true" spellcheck="false">参考范围</p>
              <b class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ctf.reference_range">0 - 120.00 ng/mL</b>
              <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p14.results.ctf.status">在参考范围内</span>
            </div>
          </article>
        </section>
        <section class="ai-strip compact-ai-strip">
          <span class="icon-orb violet">AI</span>
          <div>
            <h2 class="editable" contenteditable="true" spellcheck="false">AI辅助诊断</h2>
            <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.results.ai_summary">CDA、PTF 与 CTF 已完成联合评估，当前建议结合疾病风险分层与后续甲基化、CTC 结果做综合复核。</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
