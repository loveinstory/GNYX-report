<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第04页 - 检测结果概览（2/2）</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-04" aria-label="第04页 检测结果概览">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">安康御癌专项评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>04</strong>/11</p>
        </header>
        <section class="section-heading">
          <h1 class="editable" contenteditable="true" spellcheck="false">二、检测结果概览（2/2）</h1>
        </section>
        <section class="overview-grid" aria-label="检测结果概览">
          <article class="risk-tile panel">
            <span class="icon-orb">✓</span>
            <h2 class="editable" contenteditable="true" spellcheck="false" data-field="p14.overview.methylation.title">五癌甲基化</h2>
            <strong class="editable" contenteditable="true" spellcheck="false" data-field="p14.overview.methylation.status">低风险</strong>
          </article>
          <article class="risk-tile blue-tile panel">
            <span class="icon-orb">○</span>
            <h2 class="editable" contenteditable="true" spellcheck="false" data-field="p14.overview.ctc.title">CTC计数</h2>
            <strong class="editable" contenteditable="true" spellcheck="false" data-field="p14.overview.ctc.status">31个</strong>
          </article>
        </section>
        <section class="ai-strip">
          <span class="icon-orb violet">AI</span>
          <div>
            <h2 class="editable" contenteditable="true" spellcheck="false">AI智能诊断</h2>
            <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.overview.ai_diagnosis">甲基化与 CTC 结果需结合既往病史、症状和其他检查结果做综合随访判断。</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
