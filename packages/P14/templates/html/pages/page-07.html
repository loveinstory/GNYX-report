<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第07页 - 异常原因分析</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-07" aria-label="第07页 异常原因分析">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">安康御癌专项评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>07</strong>/11</p>
        </header>
        <section class="section-heading">
          <h1 class="editable" contenteditable="true" spellcheck="false">四、异常原因分析</h1>
        </section>
        <section class="cause-list">
          <article class="cause-card panel">
            <img src="../assets/images/p07-metabolic-icon.png" alt="代谢压力图标" />
            <div>
              <h2 class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_1.title">代谢压力（BMI/血糖）</h2>
              <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_1.body">BMI、血糖波动与慢性炎症背景可能共同影响风险指标表现，建议结合代谢相关检查做综合复核。</p>
            </div>
          </article>
          <article class="cause-card panel">
            <img src="../assets/images/p07-history-icon.png" alt="既往病史图标" />
            <div>
              <h2 class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_2.title">既往病史与家族史</h2>
              <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_2.body">既往病史、家族肿瘤史及相关治疗经历，可能影响本次风险指标的综合判断边界。</p>
            </div>
          </article>
          <article class="cause-card panel">
            <img src="../assets/images/p07-exposure-icon.png" alt="环境暴露图标" />
            <div>
              <h2 class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_3.title">环境暴露与生活方式</h2>
              <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.factor_3.body">空气污染、睡眠不足、吸烟饮酒和长期压力等生活方式因素，可能增加机体炎症与代谢负担。</p>
            </div>
          </article>
        </section>
        <section class="ai-strip">
          <span class="icon-orb">✦</span>
          <div>
            <h2 class="editable" contenteditable="true" spellcheck="false">AI 智能诊断</h2>
            <p class="editable" contenteditable="true" spellcheck="false" data-field="p14.risk_factors.ai_diagnosis">当前异常原因分析需结合既往病史、生活方式和核心指标结果进行人工复核。</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
