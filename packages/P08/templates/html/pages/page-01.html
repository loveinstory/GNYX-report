<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 心血管代谢风险评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page cover" aria-label="第01页 心血管代谢风险评估健康管理报告">
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>

        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">心血管代谢风险评估<br />健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于NT-proBNP、RAAS及血栓指标的个性化健康管理</p>
        </section>

        <img class="cover-main" src="../assets/images/cover-heart-main.png" width="760" height="760" alt="心血管代谢风险评估主图" />

        <section class="soft-card cover-patient" aria-labelledby="patient-title">
          <div class="card-title">
            <span class="mini-icon" aria-hidden="true">人</span>
            <h2 id="patient-title" class="editable" contenteditable="true" spellcheck="false">患者信息</h2>
          </div>

          <div class="info-table">
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">名</span><span class="label editable" contenteditable="true">姓名：</span><span class="value editable" contenteditable="true" data-field="patient.name">示例姓名</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">评</span><span class="label editable" contenteditable="true">评估类型：</span><span class="value editable" contenteditable="true" data-field="report.assessment_type">心血管代谢风险评估</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">性</span><span class="label editable" contenteditable="true">性别：</span><span class="value editable" contenteditable="true" data-field="patient.gender">示例性别</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">样</span><span class="label editable" contenteditable="true">样本信息：</span><span class="value editable" contenteditable="true" data-field="sample.type">血清、血浆、全血</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">龄</span><span class="label editable" contenteditable="true">年龄：</span><span class="value editable" contenteditable="true" data-field="patient.age">示例年龄</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">法</span><span class="label editable" contenteditable="true">评估方法：</span><span class="value editable" contenteditable="true" data-field="report.method">化学发光&免疫比浊</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">送</span><span class="label editable" contenteditable="true">送检单位：</span><span class="value editable" contenteditable="true" data-field="patient.submitting_unit">—</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">时</span><span class="label editable" contenteditable="true">评估日期：</span><span class="value editable" contenteditable="true" data-field="report.assessment_date">示例月份</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">症</span><span class="label editable" contenteditable="true">相关症状：</span><span class="value editable" contenteditable="true" data-field="patient.symptoms">—</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">编</span><span class="label editable" contenteditable="true">报告编号：</span><span class="value editable" contenteditable="true" data-field="report.report_id">—</span></div>
            </div>
          </div>
        </section>

        <footer class="cover-footer">
          <p class="editable" contenteditable="true" spellcheck="false">科学评估 | 精准管理 | 健康未来</p>
        </footer>
      </section>
    </main>
  </body>
</html>
