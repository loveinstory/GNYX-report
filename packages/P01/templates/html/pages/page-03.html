<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第03页 - 核心指标仪表盘</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-03" aria-label="第03页 核心指标仪表盘">
        <header class="large-report-header">
          <img class="large-header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable large-page-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;|&nbsp;第03/15页</p>
        </header>

        <section class="large-section-title">
          <span class="title-accent" aria-hidden="true"></span>
          <div>
            <h1 class="editable" contenteditable="true" spellcheck="false">二、核心指标仪表盘</h1>
            <p class="editable" contenteditable="true" spellcheck="false">将关键结果转化为可执行的健康管理线索</p>
          </div>
        </section>

        <section class="dashboard-grid">
          <article class="gauge-card">
            <div class="gauge" aria-hidden="true">
              <div class="gauge-arc arc-blue"></div>
              <div class="gauge-arc arc-teal"></div>
              <div class="gauge-arc arc-green"></div>
              <div class="gauge-arc arc-gold"></div>
              <div class="gauge-arc arc-orange"></div>
              <div class="gauge-needle"></div>
              <div class="gauge-hub"></div>
            </div>
            <div class="gmhi-line">
              <span class="editable" contenteditable="true" spellcheck="false">GMHI</span>
              <strong class="editable" contenteditable="true" data-field="p01.gmhi.result_display" spellcheck="false">54.1</strong>
            </div>
            <span class="status-pill editable" contenteditable="true" data-field="p01.gmhi.status" spellcheck="false">预警</span>
          </article>

          <article class="explain-card">
            <h2 class="editable" contenteditable="true" spellcheck="false">指标分层解释</h2>
            <p class="editable" contenteditable="true" data-field="p01.gmhi.interpretation" spellcheck="false">
              GMHI结果为预警，提示肠道<br />
              菌群结构存在一定偏离。建议<br />
              结合肠龄、多样性、定植抗<br />
              力等指标，制定阶段性健康<br />
              管理方案。
            </p>
          </article>
        </section>

        <section class="indicator-grid">
          <article class="indicator-card">
            <span class="indicator-icon bacteria-icon" aria-hidden="true"></span>
            <div>
              <h3 class="editable" contenteditable="true" spellcheck="false">肠型</h3>
              <p class="editable" contenteditable="true" data-field="p01.enterotype.result_display" spellcheck="false">普雷沃菌属型</p>
            </div>
          </article>

          <article class="indicator-card">
            <span class="indicator-icon network-icon" aria-hidden="true"></span>
            <div>
              <h3 class="editable" contenteditable="true" spellcheck="false">多样性</h3>
              <span class="small-pill editable" contenteditable="true" data-field="p01.diversity.status" spellcheck="false">需关注</span>
            </div>
          </article>

          <article class="indicator-card">
            <span class="indicator-icon cake-icon" aria-hidden="true"></span>
            <div>
              <h3 class="editable" contenteditable="true" spellcheck="false">肠龄</h3>
              <p class="editable" contenteditable="true" data-field="p01.gut_age.result_display" spellcheck="false">41岁</p>
            </div>
          </article>

          <article class="indicator-card">
            <span class="indicator-icon guard-icon" aria-hidden="true"></span>
            <div>
              <h3 class="editable" contenteditable="true" spellcheck="false">定植抗力</h3>
              <p class="editable" contenteditable="true" data-field="p01.be_index.status" spellcheck="false">正常</p>
            </div>
          </article>
        </section>

        <footer class="page-note editable" contenteditable="true" spellcheck="false">本页结果仅供健康管理参考，不作为临床诊断依据。</footer>
      </section>
    </main>
  </body>
</html>
