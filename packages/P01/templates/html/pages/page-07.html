<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第07页 - 有益菌、条件致病菌与中性菌重点解读</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-07" aria-label="第07页 有益菌、条件致病菌与中性菌重点解读">
        <header class="large-report-header page-07-header">
          <img class="large-header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable large-page-label page-07-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;|&nbsp;第07/15页</p>
        </header>

        <section class="page-07-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">六、有益菌、条件致病菌与中性菌重点解读</h1>
          <div class="title-mark" aria-hidden="true"><span></span><span></span></div>
        </section>

        <section class="microbe-focus-grid" aria-label="菌群重点解读">
          <article class="microbe-focus-card focus-blue">
            <div class="microbe-icon-wrap">
              <span class="microbe-icon shield-check-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">有益菌支持</h2>
            <span class="focus-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.flora_focus.beneficial" spellcheck="false">支持肠道屏障、短链<br />脂肪酸与免疫稳态</p>
          </article>

          <article class="microbe-focus-card focus-green">
            <div class="microbe-icon-wrap">
              <span class="microbe-icon pathogen-watch-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">条件致病菌关注</h2>
            <span class="focus-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.flora_focus.harmful" spellcheck="false">提示炎症压力、屏障<br />压力与生活方式扰动</p>
          </article>

          <article class="microbe-focus-card focus-blue">
            <div class="microbe-icon-wrap">
              <span class="microbe-icon neutral-microbe-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">中性菌背景</h2>
            <span class="focus-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.flora_focus.neutral" spellcheck="false">反映膳食模式、生态位<br />变化与长期饮食习惯</p>
          </article>
        </section>

        <section class="balance-visual" aria-label="肠道菌群生态平衡">
          <div class="balance-beam" aria-hidden="true">
            <span class="beam-center"></span>
            <span class="beam-line"></span>
            <span class="beam-left-node"></span>
            <span class="beam-right-node"></span>
          </div>

          <div class="scale-pan scale-pan-left" aria-hidden="true">
            <span class="pan-bowl"></span>
            <span class="pan-microbes microbes-good"></span>
          </div>
          <div class="scale-pan scale-pan-center" aria-hidden="true">
            <span class="pan-bowl"></span>
            <span class="pan-microbes microbes-watch"></span>
          </div>
          <div class="scale-pan scale-pan-right" aria-hidden="true">
            <span class="pan-bowl"></span>
            <span class="pan-microbes microbes-neutral"></span>
          </div>

          <div class="balance-caption">
            <span aria-hidden="true"></span>
            <p class="editable" contenteditable="true" spellcheck="false">肠道菌群生态平衡 <em>（动态稳态）</em></p>
            <span aria-hidden="true"></span>
          </div>
        </section>

        <section class="management-tip" aria-label="管理提示">
          <div class="management-tip-icon" aria-hidden="true">
            <span></span>
          </div>
          <div class="management-tip-copy">
            <h2 class="editable" contenteditable="true" spellcheck="false">管理提示</h2>
            <span class="tip-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.management_priorities" spellcheck="false">通过膳食纤维、益生元、规律作息和阶段复评降低生态扰动，<br />所有风险均为健康管理参考。</p>
          </div>
          <span class="tip-shield" aria-hidden="true"></span>
        </section>
      </section>
    </main>
  </body>
</html>
