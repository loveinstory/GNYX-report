<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 深度肠道健康管理评估报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-01" aria-label="第01页 深度肠道健康管理评估报告">
        <div class="cover-corner" aria-hidden="true"></div>
        <div class="cover-dots" aria-hidden="true"></div>

        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>

        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于肠道菌群与微生态数据的精准健康管理评估</p>
          <div class="accent-bars" aria-hidden="true"><span></span><span></span></div>
        </section>

        <section class="cover-visual" aria-hidden="true">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
          <img src="../assets/images/page-01-gut-visual.jpg" width="1320" height="1040" alt="" />
        </section>

        <section class="patient-card" aria-labelledby="patient-title">
          <div class="card-title">
            <span class="title-icon person-icon" aria-hidden="true"></span>
            <h2 id="patient-title" class="editable" contenteditable="true" spellcheck="false">患者信息</h2>
          </div>

          <div class="info-table">
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon user-icon"></span><span class="label editable" contenteditable="true">姓名：</span><span class="value editable" contenteditable="true" data-field="patient.name" spellcheck="false">耿婷婷</span></div>
              <div class="info-cell"><span class="mini-icon clipboard-icon"></span><span class="label editable" contenteditable="true">评估类型：</span><span class="value editable" contenteditable="true" data-field="report.assessment_type" spellcheck="false">深度肠道健康管理评估</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon gender-icon"></span><span class="label editable" contenteditable="true">性别：</span><span class="value editable" contenteditable="true" data-field="patient.gender" spellcheck="false">女</span></div>
              <div class="info-cell"><span class="mini-icon sample-icon"></span><span class="label editable" contenteditable="true">样本信息：</span><span class="value editable" contenteditable="true" data-field="sample.type" spellcheck="false">肠道菌群</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon calendar-icon"></span><span class="label editable" contenteditable="true">年龄：</span><span class="value editable" contenteditable="true" data-field="patient.age" spellcheck="false">34岁</span></div>
              <div class="info-cell"><span class="mini-icon lab-icon"></span><span class="label editable" contenteditable="true">评估方法：</span><span class="value editable" contenteditable="true" data-field="report.method" spellcheck="false">微生态综合评估</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon phone-icon"></span><span class="label editable" contenteditable="true">联系电话：</span><span class="value editable" contenteditable="true" data-field="patient.phone" spellcheck="false">—</span></div>
              <div class="info-cell"><span class="mini-icon clock-icon"></span><span class="label editable" contenteditable="true">评估日期：</span><span class="value editable" contenteditable="true" data-field="report.assessment_date" spellcheck="false">2026年5月</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon symptom-icon"></span><span class="label editable" contenteditable="true">相关症状：</span><span class="value editable" contenteditable="true" data-field="patient.symptoms" spellcheck="false">—</span></div>
              <div class="info-cell empty-cell" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <footer class="cover-footer">
          <span aria-hidden="true"></span>
          <p class="editable" contenteditable="true" spellcheck="false">科学评估&nbsp;&nbsp;|&nbsp;&nbsp;精准管理&nbsp;&nbsp;|&nbsp;&nbsp;健康未来</p>
          <span aria-hidden="true"></span>
        </footer>
      </section>
    </main>
  </body>
</html>
