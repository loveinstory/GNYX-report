<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第10页 - 免疫炎症与症状关联</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-10" aria-label="第10页 免疫炎症与症状关联">
        <div class="page-10-content">
          <header class="large-report-header page-10-header">
            <img class="large-header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
            <p class="editable large-page-label page-10-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;|&nbsp;第10/15页</p>
          </header>

          <section class="immune-title">
            <span class="immune-title-mark" aria-hidden="true"></span>
            <div>
              <h1 class="editable" contenteditable="true" spellcheck="false">九、免疫炎症与症状关联</h1>
              <p class="editable" contenteditable="true" spellcheck="false">将鼻塞、流涕、记忆力下降与肠道黏膜免疫联动分析</p>
            </div>
          </section>

          <section class="immune-card-grid" aria-label="免疫炎症说明">
            <img src="../assets/images/page-10-barrier-card.jpg" width="740" height="610" alt="肠道屏障与黏膜免疫：肠道黏膜是人体最大的免疫器官，菌群通过维持屏障完整性、促进分泌型IgA与抗菌肽，减少有害抗原入侵，稳定黏膜免疫平衡。" />
            <img src="../assets/images/page-10-inflammation-card.jpg" width="740" height="610" alt="炎症调节与肠脑轴：肠道炎症因子、细胞因子及代谢产物可通过肠脑轴影响中枢神经与免疫系统，进而关联鼻腔黏膜炎症与认知功能变化。" />
          </section>

          <section class="mechanism-chain" aria-label="机制链路图示">
            <img src="../assets/images/page-10-mechanism-chain.jpg" width="1510" height="560" alt="机制链路图示：菌群失衡导致屏障压力，进一步引发免疫反应，最终出现鼻塞、流涕、记忆力下降等症状表现。" />
          </section>

          <section class="regulation-advice" aria-label="调节建议">
            <img src="../assets/images/page-10-regulation-advice.jpg" width="1510" height="380" alt="调节建议：建议采用抗炎饮食、稳定睡眠节律、压力管理与阶段复评；若症状明显，应咨询医生。" />
          </section>
        </div>
      </section>
    </main>
