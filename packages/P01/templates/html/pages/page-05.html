<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第05页 - 肠型、多样性与肠龄</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-05" aria-label="第05页 肠型、多样性与肠龄">
        <header class="large-report-header page-05-header">
          <img class="large-header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable large-page-label page-05-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;|&nbsp;第05/15页</p>
        </header>

        <section class="page-05-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">四、肠型、多样性与肠龄</h1>
          <p class="editable" contenteditable="true" spellcheck="false">从生态类型、物种丰富度和生物年龄理解肠道状态</p>
        </section>

        <div class="page-05-gutmark" aria-hidden="true">
          <span></span>
        </div>

        <section class="gut-state-grid" aria-label="肠道状态概览">
          <article class="gut-state-card state-blue">
            <div class="state-icon-wrap">
              <span class="state-icon enterotype-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">肠型<br /><span data-field="p01.enterotype.result_display">普雷沃菌属型</span></h2>
            <span class="state-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.enterotype.interpretation" spellcheck="false">提示与高碳水或植物性膳食模式相关，需结合饮食结构综合管理。</p>
          </article>

          <article class="gut-state-card state-green">
            <div class="state-icon-wrap">
              <span class="state-icon diversity-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">菌群多样性<br /><span data-field="p01.diversity.status">需关注</span></h2>
            <span class="state-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.diversity.interpretation" spellcheck="false">建议提高食物种类与可发酵纤维摄入，支持生态稳定。</p>
          </article>

          <article class="gut-state-card state-teal">
            <div class="state-icon-wrap">
              <span class="state-icon gut-age-icon" aria-hidden="true"></span>
            </div>
            <h2 class="editable" contenteditable="true" spellcheck="false">肠龄<br /><span data-field="p01.gut_age.result_display">41岁</span></h2>
            <span class="state-rule" aria-hidden="true"></span>
            <p class="editable" contenteditable="true" data-field="p01.gut_age.interpretation" spellcheck="false">高于实际年龄7岁，提示生态修复优先级上升。</p>
          </article>
        </section>

        <section class="page-05-ai-card" aria-label="AI智能洞察">
          <div class="ai-brain-badge" aria-hidden="true">
            <span>AI</span>
          </div>
          <div class="ai-card-divider" aria-hidden="true"></div>
          <p class="editable" contenteditable="true" data-field="p01.ui.microbiome_brief" spellcheck="false">肠型、多样性与肠龄共同提示长期饮食结构、生活节律和炎症管理需要协同优化。</p>
        </section>
      </section>
    </main>
  </body>
</html>
