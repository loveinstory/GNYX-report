<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第06页 - 肠道微生物组成分析</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-06" aria-label="第06页 肠道微生物组成分析">
        <header class="report-header page-06-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label page-06-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;&nbsp;|&nbsp;&nbsp;第06/15页</p>
        </header>

        <section class="page-06-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">五、肠道微生物组成分析</h1>
          <p class="editable" contenteditable="true" spellcheck="false">门级与属级结构提示以普雷沃菌属和粪杆菌属为重要特征</p>
        </section>

        <div class="dna-watermark" aria-hidden="true">
          <span></span>
        </div>

        <section class="composition-grid" aria-label="肠道微生物组成图表">
          <article class="composition-card phylum-card">
            <div class="chart-heading chart-heading-blue">
              <span class="pie-heading-icon" aria-hidden="true"></span>
              <h2 class="editable" contenteditable="true" spellcheck="false">门级结构</h2>
            </div>

            <div class="donut-chart" aria-label="门级结构比例">
              <span class="donut-label label-blue editable" contenteditable="true" data-field="p01.phylum_top.item_1.percentage" spellcheck="false">52.6%</span>
              <span class="donut-label label-teal editable" contenteditable="true" data-field="p01.phylum_top.item_2.percentage" spellcheck="false">27.3%</span>
              <span class="donut-label label-lime editable" contenteditable="true" data-field="p01.phylum_top.item_3.percentage" spellcheck="false">11.8%</span>
              <span class="donut-label label-gray editable" contenteditable="true" data-field="p01.phylum_top.item_4.percentage" spellcheck="false">8.3%</span>
            </div>

            <div class="legend-row" aria-label="门级结构图例">
              <span><i class="legend-blue"></i><b class="editable" contenteditable="true" data-field="p01.phylum_top.item_1.name" spellcheck="false">厚壁菌门</b></span>
              <span><i class="legend-teal"></i><b class="editable" contenteditable="true" data-field="p01.phylum_top.item_2.name" spellcheck="false">拟杆菌门</b></span>
              <span><i class="legend-lime"></i><b class="editable" contenteditable="true" data-field="p01.phylum_top.item_3.name" spellcheck="false">放线菌门</b></span>
              <span><i class="legend-gray"></i><b class="editable" contenteditable="true" data-field="p01.phylum_top.item_4.name" spellcheck="false">其他</b></span>
            </div>
          </article>

          <article class="composition-card genus-card">
            <div class="chart-heading chart-heading-green">
              <span class="bar-heading-icon" aria-hidden="true"></span>
              <h2 class="editable" contenteditable="true" spellcheck="false">属级TOP特征</h2>
            </div>

            <div class="bar-chart" aria-label="属级TOP特征比例">
              <div class="axis-line" aria-hidden="true"></div>
              <div class="axis-guides" aria-hidden="true"><span></span><span></span><span></span><span></span></div>

              <div class="bar-row">
                <span class="bar-name editable" contenteditable="true" data-field="p01.genus_top.item_1.name" spellcheck="false">普雷沃菌属</span>
                <div class="bar-track"><span class="bar-fill bar-green" style="--bar: 93.5%"></span></div>
                <strong class="editable" contenteditable="true" data-field="p01.genus_top.item_1.percentage" spellcheck="false">18.7%</strong>
              </div>
              <div class="bar-row">
                <span class="bar-name editable" contenteditable="true" data-field="p01.genus_top.item_2.name" spellcheck="false">粪杆菌属</span>
                <div class="bar-track"><span class="bar-fill bar-green-2" style="--bar: 78%"></span></div>
                <strong class="editable" contenteditable="true" data-field="p01.genus_top.item_2.percentage" spellcheck="false">15.6%</strong>
              </div>
              <div class="bar-row">
                <span class="bar-name editable" contenteditable="true" data-field="p01.genus_top.item_3.name" spellcheck="false">拟杆菌属</span>
                <div class="bar-track"><span class="bar-fill bar-teal" style="--bar: 62%"></span></div>
                <strong class="editable" contenteditable="true" data-field="p01.genus_top.item_3.percentage" spellcheck="false">12.4%</strong>
              </div>
              <div class="bar-row">
                <span class="bar-name editable" contenteditable="true" data-field="p01.genus_top.item_4.name" spellcheck="false">双歧杆菌属</span>
                <div class="bar-track"><span class="bar-fill bar-blue" style="--bar: 44.5%"></span></div>
                <strong class="editable" contenteditable="true" data-field="p01.genus_top.item_4.percentage" spellcheck="false">8.9%</strong>
              </div>
              <div class="bar-row">
                <span class="bar-name editable" contenteditable="true" data-field="p01.genus_top.item_5.name" spellcheck="false">乳酸杆菌属</span>
                <div class="bar-track"><span class="bar-fill bar-blue-2" style="--bar: 33.5%"></span></div>
                <strong class="editable" contenteditable="true" data-field="p01.genus_top.item_5.percentage" spellcheck="false">6.7%</strong>
              </div>

              <div class="bar-axis-labels" aria-hidden="true">
                <span>0</span><span>5</span><span>10</span><span>15</span><span>20 (%)</span>
              </div>
            </div>
          </article>
        </section>

        <section class="structure-note" aria-label="结构解读">
          <div class="structure-note-copy">
            <div class="structure-note-title">
              <span class="structure-icon" aria-hidden="true"></span>
              <h2 class="editable" contenteditable="true" spellcheck="false">结构解读</h2>
              <i aria-hidden="true"></i>
            </div>
            <p class="editable" contenteditable="true" data-field="p01.ui.microbiome_brief" spellcheck="false">
              本页用于观察菌群生态构成、优势菌属与平衡状态，<br />
              为后续营养、炎症和代谢管理提供依据。
            </p>
          </div>
          <div class="intestine-outline" aria-hidden="true">
            <span></span>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
