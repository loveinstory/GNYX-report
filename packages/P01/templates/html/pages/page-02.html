<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第02页 - 综合评估结论</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-02" aria-label="第02页 综合评估结论">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">深度肠道健康管理评估报告&nbsp;&nbsp;|&nbsp;&nbsp;第02/15页</p>
        </header>

        <section class="section-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">一、综合评估结论</h1>
          <p class="editable" contenteditable="true" spellcheck="false">以GMHI、肠龄、菌群平衡指数与风险评分形成整体健康管理画像</p>
        </section>

        <section class="summary-grid">
          <article class="panel panel-blue">
            <div class="panel-heading">
              <span class="round-icon target-icon" aria-hidden="true"></span>
              <h2 class="editable" contenteditable="true" spellcheck="false">核心判断</h2>
            </div>
            <div class="metric-list">
              <div class="metric-row">
                <span class="metric-icon shield-symbol" aria-hidden="true">!</span>
                <span class="metric-label editable" contenteditable="true" spellcheck="false">GMHI</span>
                <strong class="metric-value editable blue-number" contenteditable="true" data-field="p01.gmhi.result_display" spellcheck="false">54.1</strong>
              </div>
              <div class="metric-row warning-row">
                <span class="metric-icon alarm-symbol" aria-hidden="true"></span>
                <strong class="metric-label editable full-label" contenteditable="true" data-field="p01.gmhi.status" spellcheck="false">健康风险预警</strong>
              </div>
              <div class="metric-row">
                <span class="metric-icon gut-symbol" aria-hidden="true"></span>
                <span class="metric-label editable" contenteditable="true" spellcheck="false">肠龄</span>
                <strong class="metric-value editable green-number" contenteditable="true" data-field="p01.gut_age.result_display" spellcheck="false">41岁</strong>
              </div>
              <div class="metric-row">
                <span class="metric-icon calendar-symbol" aria-hidden="true"></span>
                <span class="metric-label editable" contenteditable="true" spellcheck="false">时序年龄</span>
                <strong class="metric-value editable cyan-number" contenteditable="true" data-field="p01.chronological_age.result_display" spellcheck="false">34岁</strong>
              </div>
            </div>
          </article>

          <article class="panel panel-green">
            <div class="panel-heading">
              <span class="round-icon list-icon" aria-hidden="true"></span>
              <h2 class="editable" contenteditable="true" spellcheck="false">管理优先级</h2>
            </div>
            <div class="priority-list">
              <div class="priority-row">
                <span class="priority-icon plant-symbol" aria-hidden="true"></span>
                <strong class="editable" contenteditable="true" data-field="p01.risk_cards.primary_1.name" spellcheck="false">代谢风险管理</strong>
                <b class="editable" contenteditable="true" spellcheck="false">01</b>
              </div>
              <div class="priority-row">
                <span class="priority-icon heart-symbol" aria-hidden="true"></span>
                <strong class="editable" contenteditable="true" data-field="p01.risk_cards.primary_2.name" spellcheck="false">心血管相关风险管理</strong>
                <b class="editable" contenteditable="true" spellcheck="false">02</b>
              </div>
              <div class="priority-row">
                <span class="priority-icon shield-plus-symbol" aria-hidden="true"></span>
                <strong class="editable" contenteditable="true" data-field="p01.risk_cards.primary_3.name" spellcheck="false">肠道炎症相关风险管理</strong>
                <b class="editable" contenteditable="true" spellcheck="false">03</b>
              </div>
              <div class="priority-row">
                <span class="priority-icon moon-symbol" aria-hidden="true">z</span>
                <strong class="editable" contenteditable="true" data-field="p01.risk_cards.primary_4.name" spellcheck="false">睡眠与神经调节管理</strong>
                <b class="editable" contenteditable="true" spellcheck="false">04</b>
              </div>
            </div>
          </article>
        </section>

        <section class="ai-card ai-card-bg">
          <div class="ai-card-copy">
            <div class="ai-heading">
              <span class="ai-badge" aria-hidden="true">AI</span>
              <h2 class="editable" contenteditable="true" spellcheck="false">AI健康管理洞察</h2>
            </div>
            <p class="editable" contenteditable="true" spellcheck="false">
              <span data-field="p01.ui.overall_summary_brief">整体提示菌群生态处于预警水平，建议以12周综合干预和阶段复评为核心，优先恢复菌群多样性、降低炎症压力并优化代谢稳态。</span>
            </p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
