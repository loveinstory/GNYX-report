<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第06页 - 营养补充与注意事项</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-06" aria-label="第06页 营养补充与注意事项">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">营养素状态评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第06/08页</p>
        </header>

        <section class="section-heading">
          <h1 class="editable" contenteditable="true" spellcheck="false">五、营养补充与注意事项</h1>
          <span class="accent" aria-hidden="true"></span>
        </section>

        <section class="supplement-content">
          <article class="soft-card supplement-card">
            <div class="big-symbol" aria-hidden="true">✓</div>
            <div class="supplement-copy">
              <h2 class="editable" contenteditable="true" spellcheck="false">1. 是否需要补充</h2>
              <div class="check-row">
                <span class="check-dot" aria-hidden="true">✓</span>
                <p class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.need_summary"><strong class="blue-title">根据检测结果</strong>，您的营养素水平总体良好，无需额外补充。</p>
              </div>
              <div class="check-row">
                <span class="check-dot" aria-hidden="true">✓</span>
                <p class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.guidance">如有特殊健康状况或饮食变化，请在<strong class="blue-title">专业人员指导</strong>下进行个性化补充。</p>
              </div>
            </div>
          </article>

          <article class="soft-card green-border supplement-card">
            <div class="big-symbol" aria-hidden="true">!</div>
            <div class="supplement-copy">
              <h2 class="editable" contenteditable="true" spellcheck="false">2. 注意事项</h2>
              <div class="caution-row">
                <span class="caution-icon" aria-hidden="true">膳</span>
                <div>
                  <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.food_first_title">食补为主</h3>
                  <p class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.food_first_text">优先通过均衡饮食获取营养素，保证食物多样性。</p>
                </div>
              </div>
              <div class="caution-row">
                <span class="caution-icon" aria-hidden="true">剂</span>
                <div>
                  <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.avoid_blind_title">避免盲目补充</h3>
                  <p class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.avoid_blind_text">过量补充可能带来健康风险，请勿自行长期、大剂量服用营养补充剂。</p>
                </div>
              </div>
              <div class="caution-row">
                <span class="caution-icon" aria-hidden="true">复</span>
                <div>
                  <h3 class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.followup_title">定期复查</h3>
                  <p class="editable" contenteditable="true" spellcheck="false" data-field="p04.supplement.followup_text">建议每6~12个月进行一次营养素检测，持续关注身体营养状态变化。</p>
                </div>
              </div>
            </div>
          </article>
        </section>

        <footer class="page-footer"><span class="editable" contenteditable="true" spellcheck="false">科学检测 · 专业解读 · 健康管理</span></footer>
      </section>
    </main>
  </body>
</html>
