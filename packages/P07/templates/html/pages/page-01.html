<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 肝脏解毒功能评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page cover" aria-label="第01页 肝脏解毒功能评估健康管理报告">
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>

        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">肝脏解毒功能评估<br />健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于肝功能、肝纤维化及基因分析的个性化健康管理</p>
        </section>

        <img class="cover-main" src="../assets/images/cover-main.png" width="1800" height="1533" alt="肝脏解毒功能评估主图" />

        <section class="patient-card" aria-labelledby="patient-title">
          <div class="card-title">
            <span class="round-icon" aria-hidden="true">人</span>
            <h2 id="patient-title" class="editable" contenteditable="true" spellcheck="false">患者信息</h2>
          </div>

          <div class="info-table">
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">人</span><span class="label editable" contenteditable="true">姓名：</span><span class="value editable" contenteditable="true" data-field="patient.name">示例姓名</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">表</span><span class="label editable" contenteditable="true">评估类型：</span><span class="value editable" contenteditable="true" data-field="report.assessment_type">肝脏解毒功能评估</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">♀</span><span class="label editable" contenteditable="true">性别：</span><span class="value editable" contenteditable="true" data-field="patient.gender">女</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">样</span><span class="label editable" contenteditable="true">样本信息：</span><span class="value editable" contenteditable="true" data-field="sample.type">血清及基因检测</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">龄</span><span class="label editable" contenteditable="true">年龄：</span><span class="value editable" contenteditable="true" data-field="patient.age">示例年龄</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">法</span><span class="label editable" contenteditable="true">评估方法：</span><span class="value editable" contenteditable="true" data-field="report.method">化学发光法&amp;比色法&amp;免疫比浊法&amp;测序法</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">送</span><span class="label editable" contenteditable="true">送检单位：</span><span class="value editable" contenteditable="true" data-field="patient.submitting_unit">示例送检单位</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">时</span><span class="label editable" contenteditable="true">评估日期：</span><span class="value editable" contenteditable="true" data-field="report.assessment_date">示例月份</span></div>
            </div>
            <div class="info-row">
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">症</span><span class="label editable" contenteditable="true">相关症状：</span><span class="value editable" contenteditable="true" data-field="patient.symptoms">-</span></div>
              <div class="info-cell"><span class="mini-icon" aria-hidden="true">码</span><span class="label editable" contenteditable="true">报告编号：</span><span class="value editable" contenteditable="true" data-field="report.report_id">示例报告编号</span></div>
            </div>
          </div>
        </section>

        <footer class="cover-footer">
          <p class="editable" contenteditable="true" spellcheck="false">科学评估&nbsp;&nbsp;|&nbsp;&nbsp;精准管理&nbsp;&nbsp;|&nbsp;&nbsp;健康未来</p>
        </footer>
      </section>
    </main>
  </body>
</html>
