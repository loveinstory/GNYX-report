<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 女性激素平衡评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-01" aria-label="第01页 女性激素平衡评估健康管理报告">
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="588" height="240" alt="安为康医学检验" />
        </header>

        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">女性激素平衡评估<br />健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于个体化激素数据与生活方式的精准健康管理评估</p>
        </section>

        <section class="cover-visual" aria-hidden="true">
          <img src="../assets/images/cover-main-visual.png" width="840" height="905" alt="" />
        </section>
        <div class="cover-wave" aria-hidden="true"></div>

        <section class="patient-card" aria-labelledby="patient-title">
          <div class="panel-heading">
            <span class="round-icon" aria-hidden="true">P</span>
            <h2 id="patient-title" class="editable" contenteditable="true" spellcheck="false">患者信息</h2>
          </div>
          <div class="info-table">
            <div class="info-cell"><span class="mini-icon">N</span><span class="label editable" contenteditable="true">姓名：</span><span class="value editable" contenteditable="true" data-field="patient.name">示例姓名</span></div>
            <div class="info-cell"><span class="mini-icon">T</span><span class="label editable" contenteditable="true">评估类型：</span><span class="value editable" contenteditable="true" data-field="report.assessment_type">女性激素平衡评估</span></div>
            <div class="info-cell"><span class="mini-icon">G</span><span class="label editable" contenteditable="true">性别：</span><span class="value editable" contenteditable="true" data-field="patient.gender">女</span></div>
            <div class="info-cell"><span class="mini-icon">S</span><span class="label editable" contenteditable="true">样本信息：</span><span class="value editable" contenteditable="true" data-field="sample.type">血清</span></div>
            <div class="info-cell"><span class="mini-icon">A</span><span class="label editable" contenteditable="true">年龄：</span><span class="value editable" contenteditable="true" data-field="patient.age">示例年龄</span></div>
            <div class="info-cell"><span class="mini-icon">M</span><span class="label editable" contenteditable="true">评估方法：</span><span class="value editable" contenteditable="true" data-field="report.method">化学发光法</span></div>
            <div class="info-cell"><span class="mini-icon">U</span><span class="label editable" contenteditable="true">送检单位：</span><span class="value editable" contenteditable="true" data-field="patient.submitting_unit">安为康内部员工</span></div>
            <div class="info-cell"><span class="mini-icon">D</span><span class="label editable" contenteditable="true">评估日期：</span><span class="value editable" contenteditable="true" data-field="report.assessment_date">示例月份</span></div>
            <div class="info-cell"><span class="mini-icon">R</span><span class="label editable" contenteditable="true">相关症状：</span><span class="value editable" contenteditable="true" data-field="patient.symptoms">-</span></div>
            <div class="info-cell"><span class="mini-icon">B</span><span class="label editable" contenteditable="true">报告编号：</span><span class="value editable" contenteditable="true" data-field="report.report_id">0538000017176</span></div>
          </div>
        </section>

        <footer class="cover-footer">
          <p class="editable" contenteditable="true" spellcheck="false">科学评估&nbsp;&nbsp;|&nbsp;&nbsp;精准管理&nbsp;&nbsp;|&nbsp;&nbsp;健康未来</p>
        </footer>
      </section>
    </main>
  </body>
</html>
