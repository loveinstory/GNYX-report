<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 糖脂代谢综合评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p03-cover" aria-label="第01页 糖脂代谢综合评估健康管理报告">
        <div class="cover-corner" aria-hidden="true"></div>
        <div class="cover-dots" aria-hidden="true"></div>
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>
        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">糖脂代谢综合评估健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于血糖、血脂与胰岛功能指标的精准健康管理评估</p>
          <div class="accent-bars" aria-hidden="true"><span></span><span></span></div>
        </section>
        <section class="cover-visual" aria-hidden="true">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
          <img src="../assets/images/p03-cover-hero-300dpi.jpg" width="2680" height="2960" alt="" />
        </section>
        <section class="patient-card" aria-labelledby="patient-title">
          <div class="card-title"><span class="title-icon person-icon" aria-hidden="true"></span><h2 class="editable patient-title-text" contenteditable="true" spellcheck="false">患者信息</h2></div>
          <div class="info-table">
            <div class="info-row"><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">姓名：</span><span class="editable value" contenteditable="true" data-field="patient.name" spellcheck="false">耿婷婷</span></div><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">评估类型：</span><span class="editable value" contenteditable="true" data-field="report.assessment_type" spellcheck="false">糖脂代谢综合评估</span></div></div>
            <div class="info-row"><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">性别：</span><span class="editable value" contenteditable="true" data-field="patient.gender" spellcheck="false">女</span></div><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">样本信息：</span><span class="editable value" contenteditable="true" data-field="sample.type" spellcheck="false">血脂血糖指标</span></div></div>
            <div class="info-row"><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">年龄：</span><span class="editable value" contenteditable="true" data-field="patient.age" spellcheck="false">34岁</span></div><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">评估方法：</span><span class="editable value" contenteditable="true" data-field="report.method" spellcheck="false">化学发光/酶比色法</span></div></div>
            <div class="info-row"><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">联系电话：</span><span class="editable value" contenteditable="true" data-field="patient.phone" spellcheck="false">/</span></div><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">评估日期：</span><span class="editable value" contenteditable="true" data-field="report.assessment_date" spellcheck="false">2026年5月</span></div></div>
            <div class="info-row"><div class="info-cell"><span class="mini-icon"></span><span class="editable label" contenteditable="true" spellcheck="false">相关症状：</span><span class="editable value" contenteditable="true" data-field="patient.symptoms" spellcheck="false">/</span></div><div class="info-cell empty-cell" aria-hidden="true"></div></div>
          </div>
        </section>
        <footer class="cover-footer"><span aria-hidden="true"></span><p class="editable" contenteditable="true" spellcheck="false">科学评估&nbsp;&nbsp;|&nbsp;&nbsp;精准管理&nbsp;&nbsp;|&nbsp;&nbsp;健康未来</p><span aria-hidden="true"></span></footer>
      </section>
    </main>
  </body>
</html>
