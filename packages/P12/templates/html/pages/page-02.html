<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第02页 - 综合评估结论</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-02" aria-label="第02页 综合评估结论">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">线粒体能量与疲劳评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>02</strong>/09</p>
        </header>

        <section class="section-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">一、综合评估结论</h1>
          <span class="title-accent" aria-hidden="true"></span>
        </section>

        <section class="assessment-grid">
          <article class="panel judgement-card">
            <div class="ribbon"><span class="mini-icon" aria-hidden="true">准</span><span class="editable" contenteditable="true" spellcheck="false">核心判断</span></div>
            <div class="metric-stack">
              <div class="metric-item">
                <span class="metric-orb" aria-hidden="true">Q</span>
                <div class="metric-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false">辅酶Q10</strong>
                  <b class="editable" contenteditable="true" spellcheck="false" data-field="p12.indicators.coq10.status">正常</b>
                  <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p12.indicators.coq10.status_display">✓ 水平良好</span>
                </div>
              </div>
              <div class="metric-item">
                <span class="metric-orb red" aria-hidden="true">电</span>
                <div class="metric-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false">NAD+水平</strong>
                  <b class="editable" contenteditable="true" spellcheck="false" data-field="p12.indicators.nad.status">待复核</b>
                  <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p12.indicators.nad.status_display">待复核</span>
                </div>
              </div>
              <div class="metric-item">
                <span class="metric-orb amber" aria-hidden="true">氧</span>
                <div class="metric-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false">抗氧化能力评估</strong>
                  <b class="editable" contenteditable="true" spellcheck="false" data-field="p12.antioxidant.overall_status">待复核</b>
                  <span class="status-pill editable" contenteditable="true" spellcheck="false" data-field="p12.antioxidant.overall_status_display">待复核</span>
                </div>
              </div>
            </div>
          </article>

          <article class="panel priority-card">
            <div class="ribbon"><span class="mini-icon" aria-hidden="true">单</span><span class="editable" contenteditable="true" spellcheck="false">管理优先级</span></div>
            <div class="priority-list">
              <div class="priority-item">
                <span class="rank">1</span>
                <span class="priority-icon" aria-hidden="true">↗</span>
                <div class="priority-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_1.title">立即采取措施提升NAD+水平</strong>
                  <span class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_1.body">优先改善能量代谢状态</span>
                </div>
              </div>
              <div class="priority-item">
                <span class="rank">2</span>
                <span class="priority-icon" aria-hidden="true">心</span>
                <div class="priority-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_2.title">优化生活方式减少NAD+消耗</strong>
                  <span class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_2.body">规律作息、减轻压力、科学运动、均衡饮食</span>
                </div>
              </div>
              <div class="priority-item">
                <span class="rank">3</span>
                <span class="priority-icon" aria-hidden="true">补</span>
                <div class="priority-copy">
                  <strong class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_3.title">考虑NAD+前体补充改善线粒体功能</strong>
                  <span class="editable" contenteditable="true" spellcheck="false" data-field="p12.priorities.priority_3.body">在专业指导下进行个性化营养干预</span>
                </div>
              </div>
            </div>
          </article>
        </section>

        <section class="panel ai-insight">
          <span class="ai-mark" aria-hidden="true">AI</span>
          <div class="ai-copy">
            <h2 class="editable" contenteditable="true" spellcheck="false">AI健康管理洞察</h2>
            <p class="editable" contenteditable="true" spellcheck="false" data-field="p12.overall_summary">
              基于本次OCR识别结果生成线粒体能量与疲劳恢复相关洞察，待AI解读或规则引擎写入本次辅酶Q10、NAD+及抗氧化评估摘要。
            </p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
