<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 线粒体能量与疲劳评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page cover-page" aria-label="第01页 线粒体能量与疲劳评估健康管理报告">
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>

        <section class="cover-title">
          <h1 class="editable" contenteditable="true" spellcheck="false">线粒体能量与疲劳评估<br />健康管理报告</h1>
        </section>

        <section class="cover-visual" aria-hidden="true">
          <img src="../assets/images/cover-mito-visual.png" width="1560" height="820" alt="" />
        </section>

        <section class="cover-patient panel" aria-labelledby="patient-title">
          <div class="patient-heading">
            <span class="round-icon" aria-hidden="true">人</span>
            <h2 id="patient-title" class="editable" contenteditable="true" spellcheck="false">患者信息</h2>
          </div>
          <div class="patient-grid">
            <div class="patient-item"><span class="mini-icon">人</span><span class="label editable" contenteditable="true">姓名：</span><span class="value editable" contenteditable="true" data-field="patient.name">耿婷婷</span></div>
            <div class="patient-item"><span class="mini-icon">评</span><span class="label editable" contenteditable="true">评估类型：</span><span class="value editable" contenteditable="true" data-field="report.assessment_type">线粒体能量与疲劳评估</span></div>
            <div class="patient-item"><span class="mini-icon">性</span><span class="label editable" contenteditable="true">性别：</span><span class="value editable" contenteditable="true" data-field="patient.gender">女</span></div>
            <div class="patient-item"><span class="mini-icon">样</span><span class="label editable" contenteditable="true">样本信息：</span><span class="value editable" contenteditable="true" data-field="sample.type">能量代谢相关样本</span></div>
            <div class="patient-item"><span class="mini-icon">龄</span><span class="label editable" contenteditable="true">年龄：</span><span class="value editable" contenteditable="true" data-field="patient.age">34岁</span></div>
            <div class="patient-item"><span class="mini-icon">法</span><span class="label editable" contenteditable="true">评估方法：</span><span class="value editable" contenteditable="true" data-field="report.method">CoQ10 / NAD+ 综合评估</span></div>
            <div class="patient-item"><span class="mini-icon">送</span><span class="label editable" contenteditable="true">送检单位：</span><span class="value editable" contenteditable="true" data-field="patient.phone">—</span></div>
            <div class="patient-item"><span class="mini-icon">期</span><span class="label editable" contenteditable="true">评估日期：</span><span class="value editable" contenteditable="true" data-field="report.assessment_date">2026年5月</span></div>
            <div class="patient-item"><span class="mini-icon">症</span><span class="label editable" contenteditable="true">相关症状：</span><span class="value editable" contenteditable="true" data-field="patient.symptoms">疲劳、恢复能力下降</span></div>
            <div class="patient-item"><span class="mini-icon">码</span><span class="label editable" contenteditable="true">样本编号：</span><span class="value editable" contenteditable="true" data-field="p12.management_focus">—</span></div>
          </div>
        </section>

        <footer class="cover-footer">
          <p class="editable" contenteditable="true" spellcheck="false">科学评估&nbsp;&nbsp;|&nbsp;&nbsp;精准管理&nbsp;&nbsp;|&nbsp;&nbsp;健康未来</p>
        </footer>
      </section>
    </main>
  </body>
</html>
