<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>第01页 - 阴道微生态健康评估管理报告</title>
<link href="../assets/css/report.css" rel="stylesheet"/>
</head>
<body>
<main class="page-shell">
<section aria-label="第01页 阴道微生态健康评估管理报告" class="report-page page-01">
<header class="cover-brand">
<img alt="安为康医学检验" height="60" src="../assets/images/logo-awK.png" width="147"/>
</header>
<section class="cover-copy">
<h1 class="editable" contenteditable="true" spellcheck="false">阴道微生态健康评估管理报告</h1>
<p class="editable" contenteditable="true" spellcheck="false">基于个体化微生物群落分析与健康风险评估</p>
</section>
<section aria-hidden="true" class="cover-visual">
<img alt="" class="cover-hero-image" height="1486" src="../assets/images/p17-page01-hero-300dpi.jpg" width="2000"/>
</section>
<section aria-labelledby="patient-title" class="patient-card">
<h2 class="editable" contenteditable="true" id="patient-title" spellcheck="false">患者信息</h2>
<div class="patient-grid">
<div><span class="editable" contenteditable="true" spellcheck="false">姓名：</span><strong class="editable" contenteditable="true" data-field="patient.name" spellcheck="false">示例姓名</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">评估类型：</span><strong class="editable" contenteditable="true" data-field="report.assessment_type" spellcheck="false">阴道微生态健康评估管理报告</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">性别：</span><strong class="editable" contenteditable="true" data-field="patient.gender" spellcheck="false">女</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">样本信息：</span><strong class="editable" contenteditable="true" data-field="sample.type" spellcheck="false">分泌物</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">年龄：</span><strong class="editable" contenteditable="true" data-field="patient.age" spellcheck="false">示例年龄</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">评估方法：</span><strong class="editable" contenteditable="true" data-field="report.method" spellcheck="false">荧光PCR法</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">送检单位：</span><strong class="editable" contenteditable="true" data-field="patient.submitting_unit" spellcheck="false">示例送检单位</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">评估日期：</span><strong class="editable" contenteditable="true" data-field="report.assessment_date" spellcheck="false">示例月份</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">相关症状：</span><strong class="editable" contenteditable="true" data-field="patient.symptoms" spellcheck="false">—</strong></div>
<div><span class="editable" contenteditable="true" spellcheck="false">报告编号：</span><strong class="editable" contenteditable="true" data-field="report.report_id" spellcheck="false">P17 专项评估</strong></div>
</div>
</section>
<footer class="cover-footer">
<p class="editable" contenteditable="true" spellcheck="false">科学评估  |  精准管理  |  健康未来</p>
</footer>
</section>
</main>
</body>
</html>
