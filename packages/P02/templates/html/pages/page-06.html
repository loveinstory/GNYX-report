<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第06页 - 消化吸收功能综合评估</title>
    <link rel="stylesheet" href="../assets/css/page-06-rebuild.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page page-06" aria-label="第06页 消化吸收功能综合评估">
        <header class="report-header">
          <div class="brand-lockup">
            <img src="../assets/images/logo-awK.png" width="147" height="60" alt="AWK" />
          </div>
          <p class="editable page-label" contenteditable="true" spellcheck="false">肠道功能综合评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第06/10页</p>
        </header>

        <section class="title-block">
          <h1 class="editable" contenteditable="true" spellcheck="false">消化吸收功能综合评估</h1>
          <p class="editable" contenteditable="true" spellcheck="false">确保营养的充分利用</p>
          <div class="title-bars" aria-hidden="true"><span></span><i></i><span></span></div>
        </section>

        <section class="absorb-stack">
          <article class="info-card">
            <div class="icon-zone">
              <span class="round-mark blue-mark" aria-hidden="true">
                <svg viewBox="0 0 96 96" focusable="false">
                  <path d="M44 19v16c0 8 5 13 12 15 12 3 20 12 20 24 0 14-11 25-28 25-18 0-31-11-31-27 0-12 8-21 19-23 8-1 12-6 12-14V19" />
                  <path d="M34 63c6-4 18-5 28 0" />
                </svg>
              </span>
            </div>
            <div class="card-divider blue-line" aria-hidden="true"></div>
            <div class="card-copy">
              <h2 class="editable blue-text" contenteditable="true" spellcheck="false">消化过程的重要性</h2>
              <p class="editable" contenteditable="true" spellcheck="false">
                高效的消化吸收是身体获取能量和营养的基础。任何环节的障碍都可能导致营养不良和一系列健康问题。
              </p>
            </div>
          </article>

          <article class="info-card compact-card">
            <div class="icon-zone">
              <span class="round-mark green-mark" aria-hidden="true">
                <svg viewBox="0 0 96 96" focusable="false">
                  <path d="M32 23c0 10 0 16-8 16v12c8 0 8 6 8 16" />
                  <path d="M64 23c0 10 0 16 8 16v12c-8 0-8 6-8 16" />
                  <path d="M32 32h20c10 0 10 14 0 14H40c-8 0-8 12 0 12h16c8 0 8 12 0 12H32" />
                </svg>
              </span>
            </div>
            <div class="card-divider green-line" aria-hidden="true"></div>
            <div class="card-copy">
              <h2 class="editable green-text" contenteditable="true" spellcheck="false">常见消化吸收问题</h2>
              <p class="editable" contenteditable="true" spellcheck="false">胃酸不足、消化酶缺乏、胆汁分泌异常、小肠细菌过度生长(SIBO) 等。</p>
            </div>
          </article>

          <article class="info-card compact-card">
            <div class="icon-zone">
              <span class="round-mark blue-mark" aria-hidden="true">
                <svg viewBox="0 0 96 96" focusable="false">
                  <path d="M38 18h20" />
                  <path d="M42 18v20L24 74c-4 8 1 14 10 14h28c9 0 14-6 10-14L54 38V18" />
                  <path d="M32 66h32" />
                  <path d="M39 57h.1" />
                  <path d="M48 70h.1" />
                  <path d="M57 57h.1" />
                </svg>
              </span>
            </div>
            <div class="card-divider blue-line" aria-hidden="true"></div>
            <div class="card-copy">
              <h2 class="editable blue-text" contenteditable="true" spellcheck="false">评估指标</h2>
              <p class="editable" contenteditable="true" spellcheck="false">
                粪便弹性蛋白酶、脂肪吸收试验、呼气试验（用于SIBO检测）等可评估消化吸收功能。
              </p>
            </div>
          </article>

          <article class="info-card advice-card">
            <div class="icon-zone">
              <span class="round-mark green-mark" aria-hidden="true">
                <svg viewBox="0 0 96 96" focusable="false">
                  <path d="M22 76h52" />
                  <path d="M28 76V58h8v18" />
                  <path d="M44 76V47h8v29" />
                  <path d="M60 76V35h8v41" />
                  <path d="M26 51 40 40l11 9 19-21" />
                  <path d="M62 28h8v8" />
                </svg>
              </span>
            </div>
            <div class="card-divider green-line" aria-hidden="true"></div>
            <div class="card-copy">
              <h2 class="editable green-text" contenteditable="true" spellcheck="false">改善建议</h2>
              <p class="editable" contenteditable="true" spellcheck="false">
                建议通过细嚼慢咽、补充消化酶、优化胃酸分泌和针对性治疗肠道感染，提升消化吸收效率。同时，良好的消化吸收也有助于减轻免疫系统的负担。
              </p>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
