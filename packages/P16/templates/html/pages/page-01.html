<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 封面</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page cover-page" aria-label="第01页 封面">
        <img class="cover-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        <div class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false" data-field="report.report_title">药物基因组学评估健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false" data-field="report.subtitle">基于药物基因组学数据的精准健康管理评估</p>
          <div class="title-bar" aria-hidden="true"><span></span><span></span></div>
        </div>
        <span class="cover-dots" aria-hidden="true"></span>
        <img class="cover-visual" src="../assets/images/cover-pgx-visual.png" alt="药物基因组学主视觉" />
        <section class="patient-card" aria-label="患者信息">
          <div class="patient-heading"><span class="round-icon">人</span><span class="editable" contenteditable="true" spellcheck="false">患者信息</span></div>
          <div class="patient-grid">
            <div class="patient-row"><span>名</span><b class="editable" contenteditable="true" spellcheck="false">姓名：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="patient.name">耿婷婷</em></div>
            <div class="patient-row"><span>评</span><b class="editable" contenteditable="true" spellcheck="false">评估类型：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="report.assessment_type">药物基因组学评估</em></div>
            <div class="patient-row"><span>性</span><b class="editable" contenteditable="true" spellcheck="false">性别：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="patient.gender">女</em></div>
            <div class="patient-row"><span>样</span><b class="editable" contenteditable="true" spellcheck="false">样本信息：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="sample.type">药物基因组学</em></div>
            <div class="patient-row"><span>龄</span><b class="editable" contenteditable="true" spellcheck="false">年龄：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="patient.age">34岁</em></div>
            <div class="patient-row"><span>法</span><b class="editable" contenteditable="true" spellcheck="false">评估方法：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="report.method">基因多态性分析</em></div>
            <div class="patient-row"><span>话</span><b class="editable" contenteditable="true" spellcheck="false">联系电话：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="patient.phone">—</em></div>
            <div class="patient-row"><span>日</span><b class="editable" contenteditable="true" spellcheck="false">评估日期：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="report.assessment_date">2026年5月</em></div>
            <div class="patient-row"><span>症</span><b class="editable" contenteditable="true" spellcheck="false">相关症状：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="patient.symptoms">—</em></div>
            <div class="patient-row"><span>编</span><b class="editable" contenteditable="true" spellcheck="false">报告编号：</b><em class="editable" contenteditable="true" spellcheck="false" data-field="report.report_id">P16-DEMO-001</em></div>
          </div>
        </section>
        <div class="cover-footer">科学评估 | 精准管理 | 健康未来</div>
      </section>
    </main>
  </body>
</html>
