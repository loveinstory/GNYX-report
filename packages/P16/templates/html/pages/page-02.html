<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第02页 - 综合评估结论</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page content-page page-02" aria-label="第02页 综合评估结论">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">药物基因组学评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;<strong>02</strong>/16</p>
        </header>
        <section class="conclusion-banner">
          <span class="round-icon">一</span>
          <b class="editable" contenteditable="true" spellcheck="false">综合评估结论</b>
        </section>
        <section class="radar-card" aria-label="七类药物基因检测雷达图">
          <svg class="radar-svg" viewBox="0 0 420 420" role="img" aria-label="药物风险雷达图">
            <defs>
              <linearGradient id="radarFill" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#2fab67" stop-opacity="0.22" />
                <stop offset="1" stop-color="#086bd6" stop-opacity="0.2" />
              </linearGradient>
            </defs>
            <g transform="translate(210 210)">
              <circle r="180" fill="none" stroke="#c5ceda" />
              <circle r="135" fill="none" stroke="#c5ceda" stroke-dasharray="5 5" />
              <circle r="90" fill="none" stroke="#c5ceda" stroke-dasharray="5 5" />
              <circle r="45" fill="none" stroke="#c5ceda" stroke-dasharray="5 5" />
              <g stroke="#c5ceda" stroke-dasharray="5 5">
                <line x1="0" y1="0" x2="0" y2="-180" />
                <line x1="0" y1="0" x2="141" y2="-112" />
                <line x1="0" y1="0" x2="175" y2="40" />
                <line x1="0" y1="0" x2="78" y2="162" />
                <line x1="0" y1="0" x2="-78" y2="162" />
                <line x1="0" y1="0" x2="-175" y2="40" />
                <line x1="0" y1="0" x2="-141" y2="-112" />
              </g>
              <text x="-16" y="-152" fill="#777" font-size="15">100</text>
              <text x="-12" y="-111" fill="#777" font-size="15">75</text>
              <text x="-12" y="-66" fill="#777" font-size="15">50</text>
              <text x="-12" y="-23" fill="#777" font-size="15">25</text>
              <text x="-8" y="10" fill="#777" font-size="15">0</text>
              <polygon points="0,-122 82,-65 105,24 35,73 -90,21 -116,-92" fill="url(#radarFill)" stroke="#1c7ed6" stroke-width="3" />
              <polyline points="0,-122 82,-65 105,24" fill="none" stroke="#20a15a" stroke-width="3" />
              <polyline points="35,73 -90,21 -116,-92 0,-122" fill="none" stroke="#176fd2" stroke-width="3" />
              <g fill="#176fd2" stroke="#fff" stroke-width="4">
                <circle cx="-116" cy="-92" r="8" />
                <circle cx="-90" cy="21" r="8" />
                <circle cx="35" cy="73" r="8" />
              </g>
              <g fill="#20a15a" stroke="#fff" stroke-width="4">
                <circle cx="0" cy="-122" r="8" />
                <circle cx="82" cy="-65" r="8" />
                <circle cx="105" cy="24" r="8" />
              </g>
            </g>
          </svg>
          <div class="risk-node risk-top high"><span class="node-icon">心</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.hypertension.title">高血压用药</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.hypertension.status">敏感性高</span></div>
          <div class="risk-node risk-right-top good"><span class="node-icon">糖</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.dpp4.title">降糖药（DPP-4抑制剂）</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.dpp4.status">疗效减弱</span></div>
          <div class="risk-node risk-right-mid warn"><span class="node-icon">胰</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.sulfonylurea.title">降糖药（磺脲类）</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.sulfonylurea.status">毒副作用显著</span></div>
          <div class="risk-node risk-bottom"><span class="node-icon">盾</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.antiplatelet.title">抗血小板药物</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.antiplatelet.status">风险正常</span></div>
          <div class="risk-node risk-left-bottom"><span class="node-icon">胃</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.ppi.title">质子泵抑制剂</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.ppi.status">风险正常</span></div>
          <div class="risk-node risk-left-mid"><span class="node-icon">肝</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.statin.title">他汀类药物</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.statin.status">疗效正常</span></div>
          <div class="risk-node risk-left-top"><span class="node-icon">药</span><strong class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.anticoagulant.title">抗凝药物</strong><span class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.anticoagulant.status">风险正常</span></div>
        </section>
        <section class="summary-card panel">
          <span class="icon-orb">✓</span>
          <div>
            <h2 class="editable" contenteditable="true" spellcheck="false">评估总结</h2>
            <p class="editable" contenteditable="true" spellcheck="false" data-field="p16.summary.evaluation_summary">本次评估涵盖7类药物基因检测。重点关注：<span class="green">高血压用药敏感性高</span>、<span class="blue">他汀类疗效正常</span>、<span class="green">DPP-4抑制剂疗效减弱</span>、<span class="green">磺脲类毒副作用显著</span>。</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
