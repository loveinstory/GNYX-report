<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第03页 - 压力轴（HPA）深度评估</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p05-page p05-page-03" aria-label="第03页 压力轴（HPA）深度评估">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">压力激素与睡眠状态评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第03/10页</p>
        </header>
        <div class="page-content hpa-content">
          <section class="section-title">
            <h1 class="editable" contenteditable="true" spellcheck="false">二、压力轴（HPA）深度评估</h1>
            <p class="editable" contenteditable="true" spellcheck="false">肾上腺皮质功能与压力应对</p>
            <span aria-hidden="true"></span>
          </section>

          <section class="bullet-panel">
            <ul>
              <li class="editable" contenteditable="true" spellcheck="false">详细分析 ACTH 和皮质醇水平，评估下丘脑-垂体-肾上腺轴的基础应激调节能力。</li>
              <li class="editable" contenteditable="true" spellcheck="false">ACTH（促肾上腺皮质激素）：5.00 pmol/L，参考区间 1.59-13.98 pmol/L，结果正常。</li>
              <li class="editable" contenteditable="true" spellcheck="false">CORT（皮质醇）：188.00 nmol/L，参考区间 125.5-574.4 nmol/L，结果正常。</li>
            </ul>
          </section>

          <section class="soft-panel hpa-visual">
            <img class="full-visual-img" src="../assets/images/p05-hpa-scale-300dpi.jpg" width="2400" height="1600" alt="HPA 轴平衡示意图" />
          </section>

          <section class="result-strip green-strip">
            <span class="panel-icon green-icon" aria-hidden="true">轴</span>
            <div>
              <h2 class="editable" contenteditable="true" spellcheck="false">结果解读</h2>
              <p class="editable" contenteditable="true" spellcheck="false">孙楠楠女士的 HPA 轴功能良好，肾上腺皮质激素分泌处于健康水平，表明身体对压力的调节能力正常。</p>
            </div>
          </section>
        </div>
        <p class="editable footer-company" contenteditable="true" spellcheck="false">合肥安为康医学检验中心</p>
        <p class="editable footer-page" contenteditable="true" spellcheck="false">P03</p>
      </section>
    </main>
  </body>
