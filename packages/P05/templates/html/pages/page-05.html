<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第05页 - 代谢产物与神经递质平衡</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p05-page p05-page-05" aria-label="第05页 代谢产物与神经递质平衡">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">压力激素与睡眠状态评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第05/10页</p>
        </header>
        <div class="page-content">
          <section class="section-title">
            <h1 class="editable" contenteditable="true" spellcheck="false">四、代谢产物与神经递质平衡</h1>
            <p class="editable" contenteditable="true" spellcheck="false">儿茶酚胺代谢效率评估</p>
            <span aria-hidden="true"></span>
          </section>

          <section class="analysis-card">
            <div class="section-heading">
              <span class="small-icon" aria-hidden="true">析</span>
              <h2 class="editable" contenteditable="true" spellcheck="false">指标分析</h2>
            </div>
            <p class="editable" contenteditable="true" spellcheck="false">高香草酸（HVA）和香草扁桃酸（VMA）是多巴胺、去甲肾上腺素等儿茶酚胺类神经递质在体内代谢后的主要终产物，其水平可反映儿茶酚胺的代谢效率及神经递质平衡状态。</p>

            <div class="value-pair">
              <article>
                <h3 class="editable" contenteditable="true" spellcheck="false">高香草酸（HVA）</h3>
                <strong class="editable" contenteditable="true" data-field="p05.metabolism.hva.result" spellcheck="false">未识别</strong><span class="editable" contenteditable="true" data-field="p05.metabolism.hva.unit" spellcheck="false">nmol/L</span>
                <small class="editable" contenteditable="true" data-field="p05.metabolism.hva.reference_display" spellcheck="false">参考范围：未识别</small>
              </article>
              <article>
                <h3 class="editable" contenteditable="true" spellcheck="false">香草扁桃酸（VMA）</h3>
                <strong class="editable" contenteditable="true" data-field="p05.metabolism.vma.result" spellcheck="false">未识别</strong><span class="editable" contenteditable="true" data-field="p05.metabolism.vma.unit" spellcheck="false">nmol/L</span>
                <small class="editable" contenteditable="true" data-field="p05.metabolism.vma.reference_display" spellcheck="false">参考范围：未识别</small>
              </article>
            </div>
          </section>

          <section class="result-strip green-strip">
            <span class="panel-icon green-icon" aria-hidden="true">盾</span>
            <div>
              <h2 class="editable" contenteditable="true" spellcheck="false">结果解读</h2>
              <p class="editable" contenteditable="true" data-field="p05.metabolism.interpretation" spellcheck="false">未识别到 HVA 和 VMA 的有效检验结果，请人工核对原始报告。</p>
            </div>
          </section>

          <section class="pathway-panel">
            <h2 class="editable" contenteditable="true" spellcheck="false">儿茶酚胺代谢途径图</h2>
            <img class="pathway-img" src="../assets/images/p05-catecholamine-pathway-300dpi.jpg" width="2400" height="1100" alt="儿茶酚胺代谢途径图" />
          </section>
        </div>
        <p class="editable footer-company" contenteditable="true" spellcheck="false">合肥安为康医学检验中心</p>
        <p class="editable footer-page" contenteditable="true" spellcheck="false">P05</p>
      </section>
    </main>
  </body>
</html>
