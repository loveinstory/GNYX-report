<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第02页 - 评估结果概览与核心指标</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p05-page p05-page-02" aria-label="第02页 评估结果概览与核心指标">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">压力激素与睡眠状态评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第02/10页</p>
        </header>
        <div class="page-content overview-content">
          <section class="section-title">
            <h1 class="editable" contenteditable="true" spellcheck="false">一、评估结果概览与核心指标</h1>
            <p class="editable" contenteditable="true" spellcheck="false">AI解读：化学发光&amp;LC-MS/MS法</p>
            <span aria-hidden="true"></span>
          </section>

          <section class="overview-grid">
            <article class="soft-panel radar-panel">
              <h2 class="editable" contenteditable="true" spellcheck="false">1. 健康状态雷达图</h2>
              <img class="radar-img" src="../assets/images/p05-overview-radar-300dpi.jpg" width="3220" height="2740" alt="健康状态雷达图" />
            </article>

            <article class="soft-panel score-panel">
              <h2 class="editable" contenteditable="true" spellcheck="false">2. 健康评分</h2>
              <div class="score-ring">
                <strong class="editable" contenteditable="true" data-field="p05.health_score" spellcheck="false">88</strong>
                <span class="editable" contenteditable="true" spellcheck="false">/100</span>
              </div>
              <p class="editable" contenteditable="true" spellcheck="false">总体健康评分</p>
              <b class="editable" contenteditable="true" data-field="p05.health_score_status" spellcheck="false">良好</b>
            </article>
          </section>

          <section class="insight-panel">
            <h2 class="editable" contenteditable="true" spellcheck="false">3. 核心洞察</h2>
            <article>
              <span class="panel-icon" aria-hidden="true">评</span>
              <div>
                <h3 class="editable" contenteditable="true" spellcheck="false">激素与甲状腺功能整体平衡，状态良好。</h3>
                <p class="editable" contenteditable="true" data-field="p05.overall_summary" spellcheck="false">您的压力激素、儿茶酚胺、甲状腺及睡眠节律均处于正常范围，未见明显异常。</p>
              </div>
            </article>
            <article>
              <span class="panel-icon green-icon" aria-hidden="true">灯</span>
              <div>
                <h3 class="editable" contenteditable="true" spellcheck="false">建议关注方向：生活方式优化</h3>
                <p class="editable" contenteditable="true" spellcheck="false">尽管整体状态良好，但您报告中的“胸闷”症状可能与生活方式相关。建议关注情绪管理、规律作息、适度运动及呼吸放松练习，以进一步缓解不适，提升身心健康。</p>
              </div>
            </article>
          </section>
        </div>
        <p class="editable footer-company" contenteditable="true" spellcheck="false">合肥安为康医学检验中心</p>
        <p class="editable footer-page" contenteditable="true" spellcheck="false">P05</p>
      </section>
    </main>
  </body>
</html>
