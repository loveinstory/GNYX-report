<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第01页 - 压力激素与睡眠状态评估健康管理报告</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p05-page p05-cover" aria-label="第01页 压力激素与睡眠状态评估健康管理报告">
        <header class="cover-brand">
          <img src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
        </header>
        <section class="cover-copy">
          <h1 class="editable" contenteditable="true" spellcheck="false">压力激素与睡眠状态评估健康管理报告</h1>
          <p class="editable" contenteditable="true" spellcheck="false">基于压力激素、儿茶酚胺、甲状腺功能与睡眠节律的综合健康管理评估</p>
          <span aria-hidden="true"></span>
        </section>
        <section class="cover-hero">
          <img class="cover-hero-img" src="../assets/images/p05-cover-sleep-300dpi.jpg" width="4900" height="1800" alt="睡眠节律插画" />
        </section>
        <section class="patient-card">
          <h2 class="editable" contenteditable="true" spellcheck="false">受检者信息</h2>
          <div class="patient-grid">
            <div><span class="editable" contenteditable="true" spellcheck="false">姓名</span><strong class="editable" contenteditable="true" data-field="patient.name" spellcheck="false">孙楠楠</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">评估类型</span><strong class="editable" contenteditable="true" data-field="report.assessment_type" spellcheck="false">压力激素与睡眠状态评估</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">性别</span><strong class="editable" contenteditable="true" data-field="patient.gender" spellcheck="false">—</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">样本信息</span><strong class="editable" contenteditable="true" data-field="sample.type" spellcheck="false">多维度生物标志物</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">年龄</span><strong class="editable" contenteditable="true" data-field="patient.age" spellcheck="false">—</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">评估方法</span><strong class="editable" contenteditable="true" data-field="report.method" spellcheck="false">压力与睡眠状态综合评估</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">联系电话</span><strong class="editable" contenteditable="true" data-field="patient.phone" spellcheck="false">—</strong></div>
            <div><span class="editable" contenteditable="true" spellcheck="false">评估日期</span><strong class="editable" contenteditable="true" data-field="report.assessment_date" spellcheck="false">—</strong></div>
          </div>
        </section>
        <footer class="cover-footer"><p class="editable" contenteditable="true" spellcheck="false">科学管理压力&nbsp;&nbsp;|&nbsp;&nbsp;优化睡眠质量&nbsp;&nbsp;|&nbsp;&nbsp;提升生活品质</p></footer>
      </section>
    </main>
  </body>
</html>
