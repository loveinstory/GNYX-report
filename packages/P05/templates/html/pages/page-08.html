<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>第08页 - 精准干预方案：营养补充</title>
    <link rel="stylesheet" href="../assets/css/report.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report-page p05-page p05-page-08" aria-label="第08页 精准干预方案：营养补充">
        <header class="report-header">
          <img class="header-logo" src="../assets/images/logo-awK.png" width="147" height="60" alt="安为康医学检验" />
          <p class="editable page-label" contenteditable="true" spellcheck="false">压力激素与睡眠状态评估健康管理报告&nbsp;&nbsp;|&nbsp;&nbsp;第08/10页</p>
        </header>
        <div class="page-content nutrition-content">
          <section class="section-title">
            <h1 class="editable" contenteditable="true" spellcheck="false">七、精准干预方案：营养补充</h1>
            <p class="editable" contenteditable="true" spellcheck="false">支持神经系统健康的膳食建议</p>
            <span aria-hidden="true"></span>
          </section>

          <section class="nutrition-list-panel">
            <article class="nutrition-card">
              <div class="nutri-left">
                <span class="nutri-symbol" aria-hidden="true">Mg</span>
                <div>
                  <h2 class="editable" contenteditable="true" spellcheck="false">镁（Magnesium）</h2>
                  <p class="editable" contenteditable="true" spellcheck="false">有助于放松神经，改善睡眠质量。</p>
                </div>
              </div>
              <div class="food-side">
                <b class="editable" contenteditable="true" spellcheck="false">推荐食物</b>
                <img class="food-img" src="../assets/images/p05-food-magnesium-300dpi.jpg" width="1200" height="440" alt="镁类推荐食物" />
                <p class="editable" contenteditable="true" spellcheck="false">绿叶蔬菜 · 坚果类</p>
              </div>
            </article>

            <article class="nutrition-card">
              <div class="nutri-left">
                <span class="nutri-symbol" aria-hidden="true">B</span>
                <div>
                  <h2 class="editable" contenteditable="true" spellcheck="false">B族维生素（B-Vitamins）</h2>
                  <p class="editable" contenteditable="true" spellcheck="false">参与神经递质合成，维持神经系统正常功能。</p>
                </div>
              </div>
              <div class="food-side">
                <b class="editable" contenteditable="true" spellcheck="false">推荐食物</b>
                <img class="food-img" src="../assets/images/p05-food-b-vitamins-300dpi.jpg" width="1200" height="440" alt="B族维生素推荐食物" />
                <p class="editable" contenteditable="true" spellcheck="false">肉类 · 鸡蛋类</p>
              </div>
            </article>

            <article class="nutrition-card">
              <div class="nutri-left">
                <span class="nutri-symbol" aria-hidden="true">茶</span>
                <div>
                  <h2 class="editable" contenteditable="true" spellcheck="false">L-茶氨酸（L-Theanine）</h2>
                  <p class="editable" contenteditable="true" spellcheck="false">有助于促进放松，缓解压力与紧张。</p>
                </div>
              </div>
              <div class="food-side">
                <b class="editable" contenteditable="true" spellcheck="false">推荐食物</b>
                <img class="food-img" src="../assets/images/p05-food-theanine-300dpi.jpg" width="1200" height="440" alt="L-茶氨酸推荐食物" />
                <p class="editable" contenteditable="true" spellcheck="false">绿茶 · 茶叶</p>
              </div>
            </article>
          </section>
        </div>
        <p class="editable footer-company" contenteditable="true" spellcheck="false">合肥安为康医学检验中心</p>
        <p class="editable footer-page" contenteditable="true" spellcheck="false">P08</p>
